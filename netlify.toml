[build]
functions = "netlify/functions"

# Serve the pre-rendered static post if the build produced one (crawlers get real HTML).
[[redirects]]
from = "/blog/:slug"
to = "/blog/:slug.html"
status = 200

# Fallback for posts published since the last build — client-side render.
[[redirects]]
from = "/blog/*"
to = "/blog-post.html"
status = 200

[[redirects]]
from = "/blog"
to = "/blogs.html"
status = 301
force = true

[[redirects]]
from = "/jobs/*"
to = "/job-detail.html"
status = 200