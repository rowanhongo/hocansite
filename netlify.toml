[build]
functions = "netlify/functions"

# Pre-rendered posts are written by scripts/prerender-blogs.js to /blog/<slug>/index.html,
# so /blog/<slug> resolves to that real file without relying on the Pretty URLs setting.
# Static files take precedence over this non-forced rule, which is the fallback for
# posts published since the last build (rendered client-side).
[[redirects]]
from = "/blog/*"
to = "/blog-post.html"
status = 200

[[redirects]]
from = "/blog"
to = "/blogs.html"
status = 301
force = true

[[redirects]]
from = "/jobs/*"
to = "/job-detail.html"
status = 200