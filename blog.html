<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Hocan Holdings</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="assets/icon-512.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --rose: #C47A5A; --rose-deep: #a04a39; --navy: #1A1A2E; --sky: #4AB3D4; --muted: #6b7280; --line: #e8ecf0; }
    body {
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at 10% 15%, #e0f2ff 0%, transparent 42%),
        radial-gradient(circle at 92% 78%, #ffd9cf 0%, transparent 42%),
        #f4f6f8;
      color: #2b3340;
      -webkit-font-smoothing: antialiased;
    }
    .container { width: 92%; max-width: 1100px; margin: 0 auto; padding: 34px 0 80px; }
    .hero { position: relative; margin-bottom: 18px; background: linear-gradient(135deg, var(--navy) 0%, #262742 55%, #33304a 100%); border-radius: 20px; padding: 46px 38px; overflow: hidden; box-shadow: 0 18px 44px rgba(26,26,46,.22); }
    .hero::after { content: ""; position: absolute; top: -60%; right: -12%; width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(circle, rgba(196,122,90,.5) 0%, transparent 62%); pointer-events: none; }
    .hero h1 { position: relative; font-size: 44px; line-height: 1.12; letter-spacing: -0.025em; color: #fff; }
    .hero p { position: relative; margin-top: 10px; color: rgba(255,255,255,.76); line-height: 1.7; max-width: 620px; }

    .blog-grid { margin-top: 24px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 22px; }
    .blog-card { position: relative; background: #fff; border: 1px solid rgba(255,255,255,.8); border-radius: 18px; overflow: hidden; text-decoration: none; color: inherit; box-shadow: 0 8px 22px rgba(26,26,46,.06); display: flex; flex-direction: column; transition: transform .2s ease, box-shadow .2s ease; }
    .blog-card::before { content: ""; position: absolute; inset: 0 0 auto; height: 3px; background: linear-gradient(90deg, var(--rose) 0%, var(--sky) 100%); transform: scaleX(0); transform-origin: left; transition: transform .28s ease; z-index: 2; }
    .blog-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(26,26,46,.13); }
    .blog-card:hover::before { transform: scaleX(1); }
    .blog-card-img { width: 100%; aspect-ratio: 16 / 10; object-fit: contain; object-position: center; background: #f7f9fb; border-bottom: 1px solid var(--line); padding: 12px; display: block; transition: transform .3s ease; }
    .blog-card:hover .blog-card-img { transform: scale(1.03); }
    .blog-card-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
    .blog-card-meta { display: inline-flex; align-items: center; gap: 7px; color: var(--rose-deep); font-size: 11.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 10px; }
    .blog-card-meta::before { content: ""; width: 16px; height: 2px; background: var(--rose); border-radius: 2px; flex-shrink: 0; }
    .blog-card-title { font-size: 19px; font-weight: 700; line-height: 1.32; letter-spacing: -0.012em; margin-bottom: 8px; color: var(--navy); overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-card:hover .blog-card-title { color: var(--rose-deep); }
    .blog-card-excerpt { color: #5b6472; font-size: 15px; line-height: 1.6; overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-card-more { margin-top: auto; padding-top: 16px; color: var(--rose-deep); font-size: 13.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 7px; }
    .blog-card-more svg { transition: transform .18s ease; }
    .blog-card:hover .blog-card-more svg { transform: translateX(4px); }
    .blog-loading, .blog-empty { padding: 56px 20px; color: var(--muted); background: rgba(255,255,255,.85); border-radius: 18px; border: 1px solid rgba(255,255,255,.7); grid-column: 1/-1; text-align: center; box-shadow: 0 10px 30px rgba(26,26,46,.06); }
    a:focus-visible, button:focus-visible { outline: 2px solid var(--rose-deep); outline-offset: 3px; border-radius: 4px; }


    @media (max-width: 960px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) {
      .hero h1 { font-size: 34px; }
      .blog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Blog</h1>
      <p>Insights, updates, and stories from Hocan Holdings.</p>
    </header>

    <section id="blog-container" class="blog-grid"></section>
  </main>

  <script type="module" src="js/blog.js"></script>
</body>
</html>
