<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Hocan Holdings</title>
  <link rel="icon" type="image/png" href="Hocan%20Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #f4f6f8; color: #111; }
    .container { width: 92%; max-width: 1100px; margin: 0 auto; padding: 34px 0 80px; }
    .hero { margin-bottom: 18px; }
    .hero h1 { font-size: 44px; letter-spacing: -0.02em; }
    .hero p { margin-top: 8px; color: #555; }

    .blog-grid { margin-top: 18px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
    .blog-card { display: flex; flex-direction: column; text-decoration: none; color: inherit; background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,.04); transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .blog-card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(0,0,0,.08); }
    .blog-card-img { width: 100%; aspect-ratio: 16 / 10; object-fit: contain; object-position: center; background: #f4f6f8; border-bottom: 1px solid #eef1f4; padding: 10px; display: block; }
    .blog-card-body { padding: 18px; display: flex; flex-direction: column; flex: 1; }
    .blog-card-meta { font-size: 12px; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; color: #6b7280; margin-bottom: 10px; }
    .blog-card-title { font-size: 19px; font-weight: 700; line-height: 1.3; letter-spacing: -0.01em; margin-bottom: 8px; color: #111827; overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-card-excerpt { color: #4b5563; font-size: 15px; line-height: 1.6; overflow-wrap: anywhere; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-card-more { margin-top: auto; padding-top: 14px; color: #0f2b46; font-size: 14px; font-weight: 600; }
    .blog-loading, .blog-empty { padding: 44px 20px; color: #6b7280; background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; grid-column: 1/-1; text-align: center; }

    @media (max-width: 960px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) {
      .hero h1 { font-size: 34px; }
      .blog-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Blog</h1>
      <p>Insights, updates, and stories from Hocan Holdings.</p>
    </header>

    <section id="blog-container" class="blog-grid"></section>
  </main>

  <script type="module" src="js/blog.js"></script>
</body>
</html>
