<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post - Hocan Holdings</title>
  <link rel="icon" type="image/png" href="Hocan%20Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #f4f6f8; color: #111; }
    .container { width: 92%; max-width: 980px; margin: 24px auto 80px; }
    .article-back { display: inline-flex; align-items: center; gap: 10px; margin: 8px 0 18px; text-decoration: none; color: #5b2ca5; font-weight: 700; }
    .article { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); overflow: hidden; }
    .article-header { padding: 26px 26px 0; max-width: 800px; margin: 0 auto; }
    .article-meta { color: #6b7280; font-size: 13px; margin-bottom: 10px; }
    .article-title { font-size: 40px; letter-spacing: -0.03em; line-height: 1.1; }
    .article-excerpt { margin-top: 12px; color: #374151; font-size: 18px; line-height: 1.7; }
    .article-cover { width: 100%; max-height: 520px; object-fit: cover; display: block; margin-top: 18px; background: #e7eaf0; }
    .article-body { padding: 22px 26px 34px; max-width: 800px; margin: 0 auto; line-height: 1.9; color: #111827; }
    .article-body h2 { margin-top: 20px; margin-bottom: 10px; font-size: 24px; }
    .article-body h3 { margin-top: 18px; margin-bottom: 8px; font-size: 20px; }
    .article-body p { margin: 12px 0; }
    .article-body blockquote { margin: 16px 0; padding: 12px 14px; border-left: 3px solid #0f2b46; background: #f7fafc; border-radius: 12px; color: #374151; }
    .pt-figure { margin: 16px 0; }
    .pt-figure img { width: 100%; border-radius: 14px; display: block; }
    .pt-figure figcaption { margin-top: 7px; color: #6b7280; font-size: 13px; }
    .pt-list { margin: 12px 0 12px 18px; }
    .article-loading, .article-empty { padding: 18px; color: #555; }
    @media (max-width: 900px) { .article-title { font-size: 32px; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="blog-post"></div>
  </div>
  <script type="module" src="js/blogPost.js"></script>
</body>
</html>
