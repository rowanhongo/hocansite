<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Stories — Hocan Holdings | Client Case Studies</title>
  <meta name="description" content="Discover how Hocan Holdings has helped businesses succeed with HR consulting and logistics solutions across Kenya and East Africa.">
  <link rel="canonical" href="https://hocanholdings.co.ke/success-stories.html">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="assets/icon-512.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta property="og:title" content="Success Stories — Hocan Holdings">
  <meta property="og:description" content="Client case studies and success stories showcasing the impact of Hocan Holdings' services.">
  <meta property="og:url" content="https://hocanholdings.co.ke/success-stories.html">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://hocanholdings.co.ke/assets/og-image.png">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Success Stories — Hocan Holdings",
    "url": "https://hocanholdings.co.ke/success-stories.html",
    "description": "Client case studies and testimonials showcasing the impact of Hocan Holdings' services."
  }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body { font-family: Inter, sans-serif; background: radial-gradient(circle at 10% 20%, #e0f2ff 0%, transparent 40%), radial-gradient(circle at 90% 80%, #ffd9cf 0%, transparent 40%), #f4f6f8; color: #333; min-height: 100vh; }
    .container { width: min(1200px, 92%); margin: 26px auto 80px; }
    .glass { background: rgba(255,255,255,0.45); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; box-shadow: 0 14px 34px rgba(0,0,0,0.09); }
    .hero { padding: 28px; margin-bottom: 20px; }
    .hero h1 { font-size: 40px; margin-bottom: 8px; color: #111827; }
    .hero p { color: #4b5563; line-height: 1.7; }
    .back-btn { display: inline-block; margin-top: 14px; background: #C47A5A; color: #fff; text-decoration: none; border-radius: 10px; padding: 10px 18px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
    .back-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .stories { display: grid; gap: 18px; }
    .story { padding: 24px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .story:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(0,0,0,0.12); }
    .story h2 { margin-bottom: 10px; color: #111827; font-size: 22px; }
    .story p { color: #4b5563; line-height: 1.7; }

    .story-media { margin-top: 16px; border-radius: 14px; overflow: hidden; }
    .story-media video { width: 100%; max-height: 400px; display: block; background: #000; border-radius: 14px; }

    .carousel { position: relative; overflow: hidden; border-radius: 14px; background: #f0f0f0; }
    .carousel-track { display: flex; transition: transform 0.4s ease; }
    .carousel-track img { width: 100%; flex-shrink: 0; object-fit: cover; max-height: 400px; display: block; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; z-index: 2; transition: background 0.2s; }
    .carousel-btn:hover { background: rgba(0,0,0,0.75); }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
    .carousel-dots { text-align: center; padding: 10px 0; display: flex; justify-content: center; gap: 6px; }
    .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; border: none; cursor: pointer; padding: 0; transition: background 0.2s; }
    .carousel-dot.active { background: #C47A5A; }

    .story-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 40px 20px; }
    .story-detail-overlay.open { display: flex; }
    .story-detail { background: #fff; border-radius: 20px; width: 100%; max-width: 800px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.2); }
    .story-detail-header { background: #1A1A2E; padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; }
    .story-detail-header h2 { color: #fff; font-size: 20px; }
    .story-detail-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 26px; cursor: pointer; transition: color 0.2s; }
    .story-detail-close:hover { color: #fff; }
    .story-detail-body { padding: 28px; }
    .story-detail-body p { color: #4b5563; line-height: 1.7; font-size: 16px; margin-bottom: 20px; }
    .story-detail-body video { width: 100%; border-radius: 14px; margin-bottom: 16px; }
    .story-detail-body .carousel { margin-bottom: 16px; }

    .loading { text-align: center; padding: 60px; color: #888; font-size: 16px; }
    .empty { text-align: center; padding: 60px; color: #888; }

    @media (max-width: 768px) {
      .hero h1 { font-size: 28px; }
      .story-detail { max-width: 100%; margin: 0; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero glass">
      <h1>Success Stories</h1>
      <p>See how Hocan Holdings has helped businesses improve hiring operations and workforce outcomes across Kenya and East Africa.</p>
      <a class="back-btn" href="index.html">Back to Home</a>
    </section>
    <section class="stories" id="storiesList">
      <div class="loading glass">Loading stories…</div>
    </section>
  </main>

  <div class="story-detail-overlay" id="detailOverlay">
    <div class="story-detail">
      <div class="story-detail-header">
        <h2 id="detailTitle"></h2>
        <button class="story-detail-close" id="detailClose">×</button>
      </div>
      <div class="story-detail-body" id="detailBody"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module">
  import { getPublicSuccessStories } from './js/supabase.js';

  function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  let allStories = [];

  function buildCarousel(images, id) {
    if (!images || images.length === 0) return '';
    if (images.length === 1) return `<div class="story-media"><img src="${esc(images[0])}" alt="Story image" style="width:100%;border-radius:14px;max-height:400px;object-fit:cover;display:block;"></div>`;
    const imgs = images.map(u => `<img src="${esc(u)}" alt="Story image" loading="lazy">`).join('');
    const dots = images.map((_, i) => `<button class="carousel-dot${i===0?' active':''}" data-carousel="${id}" data-slide="${i}"></button>`).join('');
    return `<div class="carousel" data-carousel-id="${id}">
      <div class="carousel-track">${imgs}</div>
      <button class="carousel-btn prev" data-carousel="${id}" data-dir="-1">‹</button>
      <button class="carousel-btn next" data-carousel="${id}" data-dir="1">›</button>
      <div class="carousel-dots">${dots}</div>
    </div>`;
  }

  function renderStoryCard(story, index) {
    const hasVideo = !!story.video_url;
    const images = Array.isArray(story.images) ? story.images : [];
    let mediaHtml = '';
    if (hasVideo) {
      mediaHtml += `<div class="story-media"><video src="${esc(story.video_url)}" controls preload="metadata"></video></div>`;
    }
    if (images.length) {
      mediaHtml += buildCarousel(images, 'card-' + index);
    }
    return `<article class="story glass" data-story-index="${index}">
      <h2>${esc(story.title)}</h2>
      <p>${esc(story.description).substring(0, 200)}${story.description && story.description.length > 200 ? '…' : ''}</p>
      ${mediaHtml}
    </article>`;
  }

  function openDetail(story) {
    const overlay = document.getElementById('detailOverlay');
    document.getElementById('detailTitle').textContent = story.title || '';
    const body = document.getElementById('detailBody');
    let html = `<p>${esc(story.description)}</p>`;
    if (story.video_url) {
      html += `<video src="${esc(story.video_url)}" controls preload="metadata"></video>`;
    }
    const images = Array.isArray(story.images) ? story.images : [];
    if (images.length) {
      html += buildCarousel(images, 'detail');
    }
    body.innerHTML = html;
    overlay.classList.add('open');
    initCarousels(body);
  }

  function initCarousels(container) {
    container.querySelectorAll('.carousel').forEach(carousel => {
      const track = carousel.querySelector('.carousel-track');
      const imgs = track.querySelectorAll('img');
      if (imgs.length <= 1) return;
      let current = 0;
      function goTo(idx) {
        current = ((idx % imgs.length) + imgs.length) % imgs.length;
        track.style.transform = `translateX(-${current * 100}%)`;
        carousel.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === current));
      }
      carousel.querySelectorAll('.carousel-btn').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); goTo(current + parseInt(btn.dataset.dir)); });
      });
      carousel.querySelectorAll('.carousel-dot').forEach(dot => {
        dot.addEventListener('click', e => { e.stopPropagation(); goTo(parseInt(dot.dataset.slide)); });
      });
    });
  }

  async function load() {
    const container = document.getElementById('storiesList');
    try {
      allStories = await getPublicSuccessStories();
      if (!allStories.length) {
        container.innerHTML = '<div class="empty glass"><p>No success stories published yet. Check back soon!</p></div>';
        return;
      }
      container.innerHTML = allStories.map((s, i) => renderStoryCard(s, i)).join('');
      initCarousels(container);

      container.addEventListener('click', e => {
        const card = e.target.closest('[data-story-index]');
        if (!card) return;
        if (e.target.closest('video') || e.target.closest('.carousel-btn') || e.target.closest('.carousel-dot')) return;
        const idx = parseInt(card.dataset.storyIndex);
        if (allStories[idx]) openDetail(allStories[idx]);
      });
    } catch (err) {
      container.innerHTML = `<div class="empty glass"><p>Could not load stories. Please try again later.</p></div>`;
    }
  }

  document.getElementById('detailClose').addEventListener('click', () => {
    document.getElementById('detailOverlay').classList.remove('open');
  });
  document.getElementById('detailOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detailOverlay')) {
      document.getElementById('detailOverlay').classList.remove('open');
    }
  });

  load();
  </script>
</body>
</html>
