<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Job - Hocan Holdings</title>
  <link rel="icon" type="image/png" href="Hocan%20Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #f4f6f8; color: #333; }
    .container { width: min(1280px, 94%); margin: 30px auto 80px; }
    .hero { background: #fff; border-radius: 22px; padding: 28px; box-shadow: 0 14px 30px rgba(0,0,0,0.08); margin-bottom: 22px; }
    .hero-top { display: flex; justify-content: space-between; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .hero h1 { font-size: 44px; margin-bottom: 4px; color: #111827; }
    .hero p { color: #4b5563; line-height: 1.7; }
    .count { color: #6b21a8; font-weight: 600; }
    .sort-wrap { display: flex; gap: 8px; align-items: center; color: #374151; }
    .sort-select { border: 1px solid #e5e7eb; border-radius: 10px; padding: 9px 12px; background: #fff; color: #111827; }
    .back { display: inline-block; margin-bottom: 10px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 10px; padding: 10px 14px; font-weight: 600; }
    .job-list { display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .job-card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; box-shadow: 0 6px 18px rgba(0,0,0,0.06); padding: 20px; text-decoration: none; color: inherit; display: block; }
    .job-card:hover { border-color: #d0d7e2; }
    .job-card h3 { font-size: 30px; margin-bottom: 10px; color: #111827; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; color: #4b5563; font-size: 14px; }
    .pill { background: #eef4ff; color: #2e5a89; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
    .desc { margin-top: 12px; color: #4b5563; line-height: 1.6; font-size: 14px; }
    .empty { background: #fff; border-radius: 16px; padding: 20px; color: #4b5563; }
    @media (max-width: 1000px) { .job-list { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { .job-list { grid-template-columns: 1fr; } .hero h1 { font-size: 34px; } }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="hocan-hr-consulting.html">&larr; Back to HR Consulting</a>
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>Open Positions</h1>
          <p><span class="count" id="jobCount">0</span> positions available</p>
        </div>
        <label class="sort-wrap">Sort by:
          <select id="sortSelect" class="sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="title">Title A-Z</option>
          </select>
        </label>
      </div>
    </section>
    <section class="job-list" id="jobList"></section>
    <section class="empty" id="jobEmpty" hidden>No active vacancies right now. Please check back soon.</section>
  </main>
  <script>
    document.querySelectorAll("img").forEach(function (img, idx) {
      if (!img.hasAttribute("loading")) img.loading = idx < 2 ? "eager" : "lazy";
      if (!img.hasAttribute("decoding")) img.decoding = "async";
    });
    const SANITY_PROJECT_ID = "ktbj8t65";
    const SANITY_DATASET = "production";
    const SANITY_API_VERSION = "2023-10-01";
    const SANITY_API = `https://${SANITY_PROJECT_ID}.api.sanity.io/v${SANITY_API_VERSION}/data/query/${SANITY_DATASET}`;

    async function fetchJobs() {
      const query = `*[_type == "jobPost"] | order(_createdAt desc){
        _id,
        title,
        location,
        jobType,
        "slug": coalesce(slug.current, _id),
        "company": coalesce(company, "Hocan Holdings")
      }`;
      const res = await fetch(`${SANITY_API}?query=${encodeURIComponent(query)}`);
      if (!res.ok) throw new Error("Unable to load jobs");
      const data = await res.json();
      return data.result || [];
    }

    function renderJobs(jobs) {
      const list = document.getElementById("jobList");
      const empty = document.getElementById("jobEmpty");
      list.innerHTML = "";
      if (!jobs.length) {
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      document.getElementById("jobCount").textContent = jobs.length;
      jobs.forEach(job => {
        const card = document.createElement("a");
        card.className = "job-card";
        card.href = `job-detail.html?slug=${encodeURIComponent(job.slug)}`;
        card.innerHTML = `
          <h3>${job.title || "Untitled role"}</h3>
          <div class="meta">
            <span>${job.company || "Hocan Holdings"}</span>
            <span>&bull;</span>
            <span>${job.location || "Kenya"}</span>
            <span class="pill">${job.jobType || "Full-time"}</span>
          </div>
          <p class="desc">Click to view full job details and requirements.</p>
        `;
        list.appendChild(card);
      });
    }

    (async function init() {
      try {
        const jobs = await fetchJobs();
        const sortSelect = document.getElementById("sortSelect");
        function applySort(value) {
          const sorted = [...jobs];
          if (value === "title") sorted.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
          if (value === "oldest") sorted.reverse();
          renderJobs(sorted);
        }
        sortSelect.addEventListener("change", function () { applySort(this.value); });
        applySort("newest");
      } catch (e) {
        document.getElementById("jobEmpty").hidden = false;
        document.getElementById("jobEmpty").textContent = "Unable to load jobs right now. Please try again shortly.";
      }
    })();
  </script>
</body>
</html>
