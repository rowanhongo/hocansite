<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Job - Hocan Holdings</title>
  <link rel="icon" type="image/png" href="Hocan%20Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #f4f6f8; color: #333; }
    .container { width: min(1220px, 94%); margin: 22px auto 80px; }
    .back { display: inline-block; margin-bottom: 12px; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 10px; padding: 10px 14px; font-weight: 600; }
    .hero { border-radius: 22px; padding: 36px 24px 26px; box-shadow: 0 14px 30px rgba(0,0,0,0.08); margin-bottom: 22px; background: linear-gradient(130deg, #1a1a2e 0%, #4ab3d4 60%, #9ecfe0 100%); color: #fff; }
    .hero h1 { font-size: clamp(34px, 5vw, 62px); margin-bottom: 8px; line-height: 1.05; }
    .hero p { max-width: 640px; opacity: .95; line-height: 1.5; font-size: 20px; margin-bottom: 18px; }
    .filters { background: rgba(255,255,255,.17); border: 1px solid rgba(255,255,255,.25); border-radius: 16px; padding: 14px; display: grid; grid-template-columns: 1.4fr 1fr 1fr auto; gap: 10px; align-items: center; }
    .filters input, .filters select { width: 100%; border: none; background: #fff; border-radius: 10px; padding: 12px 14px; font: inherit; color: #1f2937; }
    .filters button { border: none; border-radius: 10px; background: #c47a5a; color: #fff; padding: 12px 16px; font-weight: 600; cursor: pointer; }
    .section-head { display: flex; align-items: end; justify-content: space-between; margin: 2px 0 12px; gap: 14px; }
    .section-head h2 { font-size: 48px; color: #0f172a; line-height: 1; }
    .section-head p { color: #4b5563; }
    .count { color: #1a1a2e; font-weight: 700; }
    .job-list { display: grid; gap: 14px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .job-card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; box-shadow: 0 6px 18px rgba(0,0,0,0.06); padding: 20px; text-decoration: none; color: inherit; display: block; transition: transform .15s, border-color .15s; }
    .job-card:hover { border-color: #cdd5de; transform: translateY(-2px); }
    .job-card h3 { font-size: 32px; margin-bottom: 10px; color: #111827; line-height: 1.1; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; color: #4b5563; font-size: 14px; }
    .pill { background: #ecf7fb; color: #1d6f8a; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
    .desc { margin-top: 12px; color: #4b5563; line-height: 1.6; font-size: 14px; min-height: 66px; }
    .job-footer { margin-top: 14px; display: flex; justify-content: space-between; color: #6b7280; font-size: 13px; }
    .empty { background: #fff; border-radius: 16px; padding: 20px; color: #4b5563; }
    .jobs-loading, .jobs-empty { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; color: #4b5563; grid-column: 1/-1; }
    @media (max-width: 1060px) { .job-list { grid-template-columns: 1fr 1fr; } .filters { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { .job-list { grid-template-columns: 1fr; } .section-head h2 { font-size: 40px; } .hero p { font-size: 16px; } .filters { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="hocan-hr-consulting.html">&larr; Back to HR Consulting</a>
    <section class="hero">
      <h1>Find Your<br>Perfect Role</h1>
      <p>Discover opportunities that match your skills and ambitions across Kenya and the region.</p>
      <div class="filters">
        <input id="jobSearch" type="text" placeholder="Search positions...">
        <select id="industryFilter"><option value="">All Departments</option></select>
        <select id="typeFilter"><option value="">All Job Types</option></select>
        <button id="applyFiltersBtn" type="button">Apply Filters</button>
      </div>
    </section>
    <div class="section-head">
      <div>
        <h2>Open Positions</h2>
        <p><span class="count" id="jobCount">0</span> positions available</p>
      </div>
    </div>
    <section class="job-list" id="jobList"></section>
    <section class="empty" id="jobEmpty" hidden>No active vacancies right now. Please check back soon.</section>
  </main>
  <script type="module" src="js/jobs.js"></script>
</body>
</html>
