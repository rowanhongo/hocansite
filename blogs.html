<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs - Hocan Holdings</title>
  <link rel="icon" type="image/png" href="Hocan%20Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #f4f6f8; color: #1f2937; }
    .container { width: min(1180px, 92%); margin: 0 auto; padding: 24px 0 70px; }
    .top-nav { background: #fff; border-radius: 16px; padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,.06); }
    .top-nav img { height: 52px; }
    .top-nav a { text-decoration: none; color: #374151; font-weight: 500; margin: 0 10px; }
    .top-nav a.active { color: #1a1a2e; border-bottom: 2px solid #c47a5a; padding-bottom: 6px; }
    .hero { margin-top: 22px; background: #fff; border-radius: 18px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,.05); }
    .hero h1 { font-size: 40px; margin-bottom: 8px; color: #111827; }
    .hero p { color: #6b7280; line-height: 1.7; max-width: 720px; }
    .blog-grid { margin-top: 18px; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .blog-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; overflow: hidden; text-decoration: none; color: inherit; box-shadow: 0 6px 16px rgba(0,0,0,.04); display: block; }
    .blog-card-img { width: 100%; height: 190px; object-fit: cover; background: #e5e7eb; }
    .blog-card-body { padding: 16px; }
    .blog-card-meta { color: #6b7280; font-size: 13px; margin-bottom: 8px; }
    .blog-card-title { font-size: 21px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; color: #111827; }
    .blog-card-excerpt { color: #4b5563; line-height: 1.65; }
    .blog-loading, .blog-empty { padding: 18px; color: #6b7280; background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; grid-column: 1/-1; }
    @media (max-width: 960px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { .blog-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 30px; } .top-nav { flex-direction: column; gap: 8px; } }
  </style>
</head>
<body>
  <main class="container">
    <header class="top-nav">
      <a href="index.html"><img src="assets/logo.png" alt="Hocan Holdings"></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="about-us.html">About Us</a>
        <a href="hocan-hr-consulting.html">Services</a>
        <a href="blogs.html" class="active">Blogs</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </header>
    <section class="hero">
      <h1>Insights &amp; Resources</h1>
      <p>Explore practical articles from the Hocan team on HR strategy, operations and growth.</p>
    </section>
    <section id="blog-container" class="blog-grid"></section>
  </main>
  <script type="module" src="js/blog.js"></script>
</body>
</html>
